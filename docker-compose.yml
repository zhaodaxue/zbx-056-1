version: '3.8'

services:
  backend:
    build: ./backend
    container_name: blast-monitor-backend
    ports:
      - "3002:3002"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3002
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: blast-monitor-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
