version: '3.8'

services:
  backend:
    build: ./backend
    container_name: blast-monitor-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: blast-monitor-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    restart: unless-stopped
